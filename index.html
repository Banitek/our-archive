<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Archive</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: #1e1e1e; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .card:active { transform: scale(0.95); }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .card p { margin: 8px 0; font-size: 14px; }
    </style>
</head>
<body>

    <h2>Our Memories</h2>
    <div class="grid">
        <div class="card" onclick="playAudio('audio1.mp3')"><img src="photo1.jpg" alt="Memory 1"><p>Memory 1</p></div>
        <div class="card" onclick="playAudio('audio2.mp3')"><img src="photo2.jpg" alt="Memory 2"><p>Memory 2</p></div>
        <div class="card" onclick="playAudio('audio3.mp3')"><img src="photo3.jpg" alt="Memory 3"><p>Memory 3</p></div>
        <div class="card" onclick="playAudio('audio4.mp3')"><img src="photo4.jpg" alt="Memory 4"><p>Memory 4</p></div>
        <div class="card" onclick="playAudio('audio5.mp3')"><img src="photo5.jpg" alt="Memory 5"><p>Memory 5</p></div>
        <div class="card" onclick="playAudio('audio6.mp3')"><img src="photo6.jpg" alt="Memory 6"><p>Memory 6</p></div>
        <div class="card" onclick="playAudio('audio7.mp3')"><img src="photo7.jpg" alt="Memory 7"><p>Memory 7</p></div>
        <div class="card" onclick="playAudio('audio8.mp3')"><img src="photo8.jpg" alt="Memory 8"><p>Memory 8</p></div>
        <div class="card" onclick="playAudio('audio9.mp3')"><img src="photo9.jpg" alt="Memory 9"><p>Memory 9</p></div>
        <div class="card" onclick="playAudio('audio10.mp3')"><img src="photo10.jpg" alt="Memory 10"><p>Memory 10</p></div>
    </div>

    <script>
        let currentAudio = null;
        function playAudio(file) {
            if (currentAudio) { currentAudio.pause(); }
            currentAudio = new Audio(file);
            currentAudio.play();
        }
    </script>
</body>
</html>
