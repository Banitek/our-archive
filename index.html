<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Archive</title>
    <style>
        body { 
            background: #121212; 
            color: #fff; 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px; 
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; 
            max-width: 600px; 
            margin: 0 auto; 
        }
        .card { 
            background: #1e1e1e; 
            border-radius: 8px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: transform 0.2s; 
        }
        .card:active { 
            transform: scale(0.95); 
        }
        .card img { 
            width: 100%; 
            height: 140px; 
            object-fit: cover; 
        }
        .card p { 
            margin: 8px 0; 
            font-size: 14px; 
        }
    </style>
</head>
<body>

    <h2>Our Memories</h2>
    <div class="grid">
        
        <div class="card" onclick="playAudio('audio (1).mp3')">
            <img src="photo (1).jpg" alt="Memory 1">
            <p>Caption 1</p>
        </div>
        
        <div class="card" onclick="playAudio('audio (2).mp3')">
            <img src="photo (2).jpg" alt="Memory 2">
            <p>Caption 2</p>
        </div>
        
        <div class="card" onclick="playAudio('audio (3).mp3')">
            <img src="photo (3).jpg" alt="Memory 3">
            <p>Caption 3</p>
        </div>

    </div>

    <script>
        let currentAudio = null;
        function playAudio(file) {
            if (currentAudio) { currentAudio.pause(); }
            currentAudio = new Audio(file);
            currentAudio.play();
        }
    </script>
</body>
</html>
